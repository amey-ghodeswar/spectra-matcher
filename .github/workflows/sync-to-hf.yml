name: Sync to Hugging Face Space

on:
  push:
      branches: [main]
        workflow_dispatch:

        jobs:
          sync:
              runs-on: ubuntu-latest
                  steps:
                        - name: Checkout repo
                                uses: actions/checkout@v4

                                      - name: Push code (excluding large reference_data.pkl) to Hugging Face Space
                                              env:
                                                        HF_TOKEN: ${{ secrets.HF_TOKEN }}
                                                                  HF_USERNAME: ${{ secrets.HF_USERNAME }}
                                                                            HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
                                                                                    run: |
                                                                                              rm -rf /tmp/space-push
                                                                                                        mkdir /tmp/space-push
                                                                                                                  rsync -a --exclude 'reference_data.pkl' --exclude '.git' ./ /tmp/space-push/
                                                                                                                            cd /tmp/space-push
                                                                                                                                      git init -b main
                                                                                                                                                git config user.name "github-actions"
                                                                                                                                                          git config user.email "actions@github.com"
                                                                                                                                                                    git add -A
                                                                                                                                                                              git commit -m "Sync from GitHub (code only; reference_data.pkl managed directly on the Space)"
                                                                                                                                                                                        git remote add hf https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}
                                                                                                                                                                                                  git push hf main --force
                                                                                                                                                                                                  

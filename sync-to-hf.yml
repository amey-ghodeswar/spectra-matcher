name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger it manually from the Actions tab too

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (full history, needed for a clean push)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true          # reference_data.pkl is large — pull it via LFS

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          git lfs install
          git remote add hf https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}
          git push hf main --force
